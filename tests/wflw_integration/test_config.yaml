input_cameras:
    - name: "TestCamera"
      path: "/dev/video0"
      width: 640
      height: 480
      buffer_count: 2

output_cameras:
    - name: "TestVirtualCamera"
      path: "/dev/video20"
      width: 640
      height: 480
      jpeg_quality: 90
      subsampling: "444"  # Options: 444, 422, 420, gray, 440, 411

external_data:
    media_folder_path: "../media/"
    models_folder_path: "../models/"
    preload_content: true
    WFLW_folder_path: "../WFLW"

window:
    title: "LinuxFace Test Suite"
    width: 640
    height: 480

# Test configuration: Force CPU execution for consistent testing
enable_gpu: false
