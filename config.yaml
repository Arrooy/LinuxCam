input_cameras:
    # - name: "Logitech"
    #   path: "/dev/video4"
    #   width: 1280
    #   height: 720
    #   buffer_count: 2

# Enable to also ingest frames over WebSocket
websocket_input_enabled: true

output_cameras:
    - name: "VirtualCamera"
      path: "/dev/video8"
      width: 640
      height: 480
      jpeg_quality: 90
      subsampling: "444" # Options: 444, 422, 420, gray, 440, 411

external_data:
    media_folder_path: "../media"
    models_folder_path: "../models"
    preload_content: true
    WFLW_folder_path: "../WFLW"

window:
    title: "LinuxFace"
    width: 640
    height: 480
    headless: false

web_server:
    host: "0.0.0.0"
    port: 8443
    document_root: "../www"
    thread_count: 4
    ssl_cert: "../ssl/cert.pem"
    ssl_key: "../ssl/key.pem"

# Streaming configuration - define which modes the server supports
# Client will choose one mode, server adapts to client's selection per connection
streaming:
    # Supported modes (server capabilities)
    supported_modes:
        jpeg_websocket: true   # Enable JPEG/WebSocket streaming support
        webrtc: true           # Enable WebRTC H.264 streaming support

    # JPEG/WebSocket streaming settings (used when client selects 'jpeg' mode)
    jpeg:
        quality: 65
        max_queue_size: 1

    # WebRTC streaming settings (used when client selects 'webrtc' mode)
    webrtc:
        codec: "H264" # H264, VP8, or VP9
        bitrate: 5000000 # bits per second (5 Mbps - matches browser→server bitrate for 720p)
        framerate: 30
        # FFmpeg preset: ultrafast, superfast, veryfast, faster, fast, medium, slow, slower, veryslow
        preset: "fast" # FFmpeg preset: balance between quality and speed

        # Adaptive bitrate (experimental): automatically adjust bitrate based on network conditions
        # DISABLED: Does  not work well with bidirectional video. WebRTC should handle it well.
        enable_adaptive_bitrate: false

        # TODO: Replace with private STUN/TURN servers for production
        # Using Google's public STUN servers for now
        stun_servers:
            - "stun:stun.l.google.com:19302"
            - "stun:stun1.l.google.com:19302"

enable_gpu: true
enable_debug: false
