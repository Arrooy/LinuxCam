name: CI Workflow

on:
    push:
        branches: [develop, main]
    pull_request:
        branches: [develop, main]

env:
    # Use ccache to speed up builds
    CCACHE_COMPRESS: "true"
    CCACHE_COMPRESSLEVEL: "6"
    CCACHE_MAXSIZE: "400M"

jobs:
    build-test:
        name: Build and Test
        runs-on: ubuntu-latest
        timeout-minutes: 90
        strategy:
            fail-fast: false
            matrix:
                build_type: [Debug, Release]

        steps:
            - name: Checkout source with submodules
              uses: actions/checkout@v4
              with:
                  submodules: recursive

            - name: Get CPU info
              if: runner.debug == '1' || github.event_name == 'workflow_dispatch'
              run: |
                  echo "CPU info:"
                  lscpu
                  echo "Memory info:"
                  free -h

            - name: Install System Dependencies
              run: |
                  sudo apt-get update
                  sudo apt-get install -y \
                    cmake \
                    ninja-build \
                    g++-12 \
                    gcc-12 \
                    nasm \
                    gcovr \
                    lcov \
                    ccache \
                    libgl1-mesa-dev \
                    libglu1-mesa-dev \
                    libxinerama-dev \
                    libxcursor-dev \
                    libxi-dev \
                    libxrandr-dev \
                    libopenblas-dev \
                    liblapack-dev \
                    libavdevice-dev \
                    libavfilter-dev \
                    libavformat-dev \
                    libavcodec-dev \
                    libswresample-dev \
                    libswscale-dev \
                    libavutil-dev \
                    libjxl-dev \
                    libopencv-dev \
                    unzip

            - name: Setup ccache
              uses: hendrikmuhs/ccache-action@v1.2
              with:
                  key: ${{ matrix.build_type }}-${{ runner.os }}
                  max-size: 400M

            - name: Set GCC version
              run: |
                  sudo update-alternatives --install /usr/bin/gcc gcc /usr/bin/gcc-12 100
                  sudo update-alternatives --install /usr/bin/g++ g++ /usr/bin/g++-12 100
                  sudo update-alternatives --install /usr/bin/gcov gcov /usr/bin/gcov-12 100

                  # Verify versions
                  echo "Compiler versions:"
                  gcc --version | head -1
                  g++ --version | head -1
                  gcov --version | head -1

            - name: Cache CMake dependencies
              uses: actions/cache@v4
              with:
                  path: |
                      ~/.cache/cmake
                      build-${{ matrix.build_type }}/_deps
                  key: ${{ runner.os }}-cmake-${{ matrix.build_type }}-${{ hashFiles('CMakeLists.txt', 'cmake/**') }}
                  restore-keys: |
                      ${{ runner.os }}-cmake-${{ matrix.build_type }}-
                      ${{ runner.os }}-cmake-

            - name: Configure CMake (${{ matrix.build_type }})
              run: |
                  # Set coverage flag for Debug builds
                  COVERAGE_FLAG="-DENABLE_COVERAGE=OFF"
                  if [ "${{ matrix.build_type }}" = "Debug" ]; then
                    COVERAGE_FLAG="-DENABLE_COVERAGE=ON"
                  fi

                  cmake -S . -B build-${{ matrix.build_type }} \
                    -DCMAKE_BUILD_TYPE=${{ matrix.build_type }} \
                    -DBUILD_TESTING=ON \
                    $COVERAGE_FLAG \
                    -DUSE_AVX_INSTRUCTIONS=OFF \
                    -DDLIB_NO_GUI_SUPPORT=ON \
                    -DDLIB_USE_CUDA=OFF \
                    -DCMAKE_C_COMPILER_LAUNCHER=ccache \
                    -DCMAKE_CXX_COMPILER_LAUNCHER=ccache \
                    -G Ninja

            - name: Build External Dependencies (${{ matrix.build_type }})
              run: |
                  echo "Building external dependencies..."
                  # Build external dependencies first (non-parallel to ensure proper order)
                  if ! cmake --build build-${{ matrix.build_type }} --target libjpeg-turbo; then
                    echo "ERROR: Failed to build libjpeg-turbo"
                    exit 1
                  fi
                  
                  if ! cmake --build build-${{ matrix.build_type }} --target libjpeg_include_dir; then
                    echo "ERROR: Failed to build libjpeg_include_dir"
                    exit 1
                  fi

            - name: Build Project (${{ matrix.build_type }})
              run: |
                  echo "Building main project..."
                  # Then build the main project in parallel
                  if ! cmake --build build-${{ matrix.build_type }} --parallel $(nproc); then
                    echo "ERROR: Main project build failed"
                    exit 1
                  fi

            - name: List Build Artifacts (${{ matrix.build_type }})
              run: |
                  echo "Build artifacts:"
                  find build-${{ matrix.build_type }} -name "*.a" -o -name "linuxface*" -type f | head -20

            - name: Run Tests (${{ matrix.build_type }})
              working-directory: build-${{ matrix.build_type }}
              run: |
                  echo "Available tests:"
                  if command -v jq &> /dev/null; then
                    ctest --show-only=json-v1 2>/dev/null | jq '.tests[].name' || ctest --show-only
                  else
                    ctest --show-only
                  fi

                  echo "Running tests..."
                  # Run tests with verbose output on failure
                  if ! ctest --output-on-failure --parallel $(nproc) --verbose; then
                    echo "ERROR: Tests failed"
                    exit 1
                  fi

                  # For Debug builds, verify coverage data was generated
                  if [ "${{ matrix.build_type }}" = "Debug" ]; then
                    echo "Checking for coverage data files..."
                    GCDA_COUNT=$(find . -name "*.gcda" | wc -l)
                    GCNO_COUNT=$(find . -name "*.gcno" | wc -l)
                    echo "Found $GCDA_COUNT .gcda files and $GCNO_COUNT .gcno files"

                    if [ $GCDA_COUNT -eq 0 ]; then
                      echo "WARNING: No .gcda files found - coverage data may not be generated properly"
                      echo "Listing some object files:"
                      find . -name "*.o" | head -10
                    else
                      echo "Coverage data files found - ready for coverage analysis"
                      find . -name "*.gcda" | head -5
                    fi
                  fi

            - name: Generate Coverage Report (Debug only)
              if: matrix.build_type == 'Debug'
              working-directory: build-Debug
              run: |
                  echo "Generating coverage report..."

                  # Clean up any stale gcov files
                  find . -name "*.gcov" -delete

                  # Verify we have the necessary files
                  echo "Coverage data verification:"
                  GCDA_COUNT=$(find . -name "*.gcda" | wc -l)
                  GCNO_COUNT=$(find . -name "*.gcno" | wc -l)
                  echo "GCDA files: $GCDA_COUNT"
                  echo "GCNO files: $GCNO_COUNT"

                  if [ $GCDA_COUNT -eq 0 ] || [ $GCNO_COUNT -eq 0 ]; then
                    echo "ERROR: Insufficient coverage data files found"
                    echo "GCDA files: $GCDA_COUNT, GCNO files: $GCNO_COUNT"
                    exit 1
                  fi

                  # Show some example paths to verify exclusions work
                  echo "Sample .gcda files:"
                  find . -name "*.gcda" | head -3

                  # Generate coverage report with improved settings
                  if ! gcovr -r ../ \
                    --exclude-directories '../external' \
                    --exclude-directories '../build-Debug' \
                    --exclude '../tests/.*' \
                    --exclude '../external/.*' \
                    --filter '../src/.*' \
                    --xml-pretty \
                    -o coverage.xml \
                    --print-summary \
                    --gcov-executable gcov-12 \
                    --verbose; then
                    echo "ERROR: Coverage report generation failed"
                    exit 1
                  fi

                  # Verify coverage file was created and has content
                  if [ -f coverage.xml ] && [ -s coverage.xml ]; then
                    echo "✅ Coverage file generated successfully"
                    echo "Coverage file size: $(wc -c < coverage.xml) bytes"
                    echo "Coverage file preview:"
                    head -20 coverage.xml

                    # Extract and display coverage percentage if available
                    COVERAGE_PERCENT=$(grep -o 'line-rate="[0-9.]*"' coverage.xml | head -1 | grep -o '[0-9.]*' || echo "unknown")
                    echo "📊 Overall line coverage: ${COVERAGE_PERCENT}"
                  else
                    echo "❌ ERROR: Coverage file not generated or empty"
                    ls -la coverage.* 2>/dev/null || echo "No coverage files found"
                    exit 1
                  fi

            - name: Upload Coverage to Codecov
              if: matrix.build_type == 'Debug'
              uses: codecov/codecov-action@v5
              with:
                  files: build-Debug/coverage.xml
                  token: ${{ secrets.CODECOV_TOKEN }}
                  flags: unittests
                  name: codecov-coverage
                  fail_ci_if_error: true
                  verbose: true

            - name: Upload Test Results (${{ matrix.build_type }})
              uses: actions/upload-artifact@v4
              if: always()
              with:
                  name: test-results-${{ matrix.build_type }}
                  path: |
                      build-${{ matrix.build_type }}/Testing/
                      build-${{ matrix.build_type }}/*.xml
                      build-${{ matrix.build_type }}/*.html
                      build-${{ matrix.build_type }}/*.log
                  retention-days: 30

            - name: Upload Coverage Files (Debug only)
              uses: actions/upload-artifact@v4
              if: matrix.build_type == 'Debug'
              with:
                  name: coverage-files
                  path: |
                      build-Debug/coverage.xml
                      build-Debug/coverage.html
                  retention-days: 30

    format-check:
        name: Check Code Format
        runs-on: ubuntu-latest
        timeout-minutes: 10
        # Run on PRs to check formatting
        if: github.event_name == 'pull_request'
        
        steps:
            - name: Checkout source
              uses: actions/checkout@v4

            - name: Install clang-format
              run: |
                  sudo apt-get update
                  sudo apt-get install -y clang-format-12
                  
                  # Create symlink for clang-format
                  sudo ln -sf /usr/bin/clang-format-12 /usr/bin/clang-format
                  
                  # Verify installation
                  clang-format --version

            - name: Check code formatting
              run: |
                  echo "Checking code formatting..."
                  
                  # Find all C/C++ source files (excluding external dependencies)
                  find . -name "*.cpp" -o -name "*.hpp" -o -name "*.c" -o -name "*.h" -o -name "*.cc" -o -name "*.cxx" \
                    | grep -v -E '^\./(external|build|_deps|experimental)/' \
                    > source_files.txt
                  
                  TOTAL_FILES=$(wc -l < source_files.txt)
                  echo "Found $TOTAL_FILES C/C++ source files to check"
                  
                  if [ "$TOTAL_FILES" -eq 0 ]; then
                    echo "✅ No source files found to check"
                    exit 0
                  fi
                  
                  # Check formatting
                  MISFORMATTED_FILES=""
                  while IFS= read -r file; do
                    if ! clang-format --dry-run --Werror "$file" >/dev/null 2>&1; then
                      MISFORMATTED_FILES="$MISFORMATTED_FILES$file\n"
                    fi
                  done < source_files.txt
                  
                  if [ -n "$MISFORMATTED_FILES" ]; then
                    echo "❌ The following files are not properly formatted:"
                    echo -e "$MISFORMATTED_FILES"
                    echo ""
                    echo "Please run clang-format on these files and commit the changes."
                    echo "You can use: clang-format -i <file>"
                    exit 1
                  else
                    echo "✅ All source files are properly formatted"
                  fi

    format-code:
        name: Auto-Format Code
        runs-on: ubuntu-latest
        timeout-minutes: 10
        # Only run on pushes to develop branch (not on PRs)
        if: github.event_name == 'push' && github.ref == 'refs/heads/develop'
        needs: build-test
        
        steps:
            - name: Checkout source
              uses: actions/checkout@v4
              with:
                  token: ${{ github.token }}
                  fetch-depth: 0

            - name: Install clang-format
              run: |
                  sudo apt-get update
                  sudo apt-get install -y clang-format-12
                  
                  # Create symlink for clang-format
                  sudo ln -sf /usr/bin/clang-format-12 /usr/bin/clang-format
                  
                  # Verify installation
                  clang-format --version

            - name: Format changed source files
              id: format-files
              run: |
                  echo "Checking for changed C/C++ source files to format..."
                  
                  # Get list of changed files in this push (C/C++ source files only)
                  if ! git diff --name-only HEAD~1 HEAD \
                    | grep -E '\.(cpp|hpp|c|h|cc|cxx)$' \
                    | grep -v -E '^(external|build|_deps|experimental)/' \
                    > changed_source_files.txt; then
                    touch changed_source_files.txt  # Create empty file if no matches
                  fi
                  
                  CHANGED_FILES=$(wc -l < changed_source_files.txt)
                  echo "Found $CHANGED_FILES changed C/C++ source files"
                  
                  if [ "$CHANGED_FILES" -eq 0 ]; then
                    echo "✅ No C/C++ source files were changed in this push"
                    echo "needs_format=false" >> $GITHUB_OUTPUT
                    echo "has_changes=false" >> $GITHUB_OUTPUT
                    exit 0
                  fi
                  
                  echo "Changed source files to format:"
                  cat changed_source_files.txt
                  
                  # Apply clang-format only to changed files
                  echo "Applying clang-format to changed files..."
                  if ! xargs -r clang-format -i < changed_source_files.txt; then
                    echo "ERROR: clang-format failed"
                    exit 1
                  fi
                  
                  # Check if formatting made any changes
                  if git diff --quiet; then
                    echo "✅ Changed files were already properly formatted"
                    echo "needs_format=false" >> $GITHUB_OUTPUT
                    echo "has_changes=false" >> $GITHUB_OUTPUT
                  else
                    echo "✨ Formatting changes applied to modified files"
                    echo "needs_format=true" >> $GITHUB_OUTPUT
                    echo "has_changes=true" >> $GITHUB_OUTPUT
                    
                    echo "Files that were reformatted:"
                    git diff --name-only
                    
                    echo "Summary of formatting changes:"
                    git diff --stat
                  fi

            - name: Commit and push formatting changes
              if: steps.format-files.outputs.needs_format == 'true' && steps.format-files.outputs.has_changes == 'true'
              run: |
                  echo "Committing formatting changes..."
                  
                  # Configure git
                  git config --local user.email "action@github.com"
                  git config --local user.name "GitHub Action - Code Formatter"
                  
                  # Stage and commit changes
                  git add -A
                  git commit -m "🎨 Auto-format code with clang-format
                  
                  - Applied clang-format to changed C/C++ source files
                  - Triggered by merge to develop branch
                  - Configuration: .clang-format"
                  
                  # Push changes
                  if ! git push; then
                    echo "ERROR: Failed to push formatting changes"
                    exit 1
                  fi
                  
                  echo "✅ Formatting changes committed and pushed"

            - name: Summary
              if: always()
              run: |
                  echo "## 🎨 Code Formatting Summary"
                  echo "- Event: ${{ github.event_name }}"
                  echo "- Branch: ${{ github.ref }}"
                  echo "- Needs formatting: ${{ steps.format-files.outputs.needs_format || 'not checked' }}"
                  echo "- Has changes: ${{ steps.format-files.outputs.has_changes || 'not checked' }}"
                  
                  if [ "${{ steps.format-files.outputs.needs_format }}" = "true" ] && [ "${{ steps.format-files.outputs.has_changes }}" = "true" ]; then
                    echo "- ✅ Code was automatically formatted and committed"
                  elif [ "${{ steps.format-files.outputs.needs_format }}" = "false" ]; then
                    echo "- ✅ Code was already properly formatted"
                  else
                    echo "- ℹ️  No formatting changes were needed"
                  fi
