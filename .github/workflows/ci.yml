name: CI Workflow

on:
  push:
    branches: [ develop ]
  pull_request:
    branches: [ develop ]

jobs:
  build-test:
    name: Build and Test
    runs-on: ubuntu-latest
    strategy:
      matrix:
        build_type: [Debug, Release]

    steps:
    - name: Checkout source with submodules
      uses: actions/checkout@v4
      with:
        submodules: recursive

    - name: Install System Dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          cmake \
          ninja-build \
          g++-12 \
          gcc-12 \
          nasm \
          gcovr \
          lcov \
          libgl1-mesa-dev \
          libglu1-mesa-dev \
          libxinerama-dev \
          libxcursor-dev \
          libxi-dev \
          libxrandr-dev \
          libopenblas-dev \
          liblapack-dev \
          libavdevice-dev \
          libavfilter-dev \
          libavformat-dev \
          libavcodec-dev \
          libswresample-dev \
          libswscale-dev \
          libavutil-dev \
          libjxl-dev \
          libopencv-dev \
          unzip

    - name: Set GCC version
      run: |
        sudo update-alternatives --install /usr/bin/gcc gcc /usr/bin/gcc-12 100
        sudo update-alternatives --install /usr/bin/g++ g++ /usr/bin/g++-12 100
        sudo update-alternatives --install /usr/bin/gcov gcov /usr/bin/gcov-12 100

    - name: Configure CMake (${{ matrix.build_type }})
      run: |
        cmake -S . -B build-${{ matrix.build_type }} \
              -DCMAKE_BUILD_TYPE=${{ matrix.build_type }} \
              -DBUILD_TESTING=ON \
              -DCMAKE_CXX_FLAGS="$([ "${{ matrix.build_type }}" = "Debug" ] && echo "--coverage -fprofile-arcs -ftest-coverage" || echo "")" \
              -DCMAKE_C_FLAGS="$([ "${{ matrix.build_type }}" = "Debug" ] && echo "--coverage -fprofile-arcs -ftest-coverage" || echo "")" \
              -DUSE_AVX_INSTRUCTIONS=OFF \
              -DDLIB_NO_GUI_SUPPORT=ON \
              -DDLIB_USE_CUDA=OFF \
              -G Ninja

    - name: Build Project (${{ matrix.build_type }})
      run: |
        # Build external dependencies first (non-parallel to ensure proper order)
        cmake --build build-${{ matrix.build_type }} --target libjpeg-turbo
        cmake --build build-${{ matrix.build_type }} --target libjpeg_include_dir
        # Then build the main project in parallel
        cmake --build build-${{ matrix.build_type }} --parallel

    - name: Run Tests (${{ matrix.build_type }})
      working-directory: build-${{ matrix.build_type }}
      continue-on-error: true
      run: |
        ctest --output-on-failure --parallel

    - name: Generate Coverage Report (Codecov)
      if: matrix.build_type == 'Debug'
      working-directory: build-Debug
      run: |
        # Clean up any stale gcov files
        find . -name "*.gcov" -delete
        # Generate coverage report with explicit gcov version and better error handling
        gcovr -r ../ \
          --exclude-directories ../external \
          --exclude ../tests \
          --xml-pretty \
          -o coverage.xml \
          --print-summary \
          --gcov-executable gcov-12 \
          --verbose || echo "Coverage generation had issues but continuing..."

    - name: Upload to Codecov
      if: matrix.build_type == 'Debug'
      uses: codecov/codecov-action@v4
      with:
        files: build-Debug/coverage.xml
        token: ${{ secrets.CODECOV_TOKEN }}  # optional for public repos
        flags: unittests
        name: codecov-coverage
        fail_ci_if_error: false  # Don't fail CI if codecov upload fails
      continue-on-error: true  # Don't fail the workflow if coverage upload fails

    - name: Upload Test Results (${{ matrix.build_type }})
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: test-results-${{ matrix.build_type }}
        path: |
          build-${{ matrix.build_type }}/Testing/
          build-${{ matrix.build_type }}/*.log
