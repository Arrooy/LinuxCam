name: Code Formatting

on:
  # Run after CI workflow completes successfully on develop
  workflow_run:
    workflows: ["CI Workflow"]
    types: [completed]
    branches: [develop]
  
  # Check formatting on PRs (independent of CI)
  pull_request:
    branches: [develop]
  
  # Allow manual triggering for formatting changed files
  workflow_dispatch:

env:
  # Formatting specific settings
  CLANG_FORMAT_VERSION: "15"

jobs:
  format-check:
    name: Check Code Format
    runs-on: ubuntu-latest
    timeout-minutes: 10
    # Only run on PRs to validate formatting
    if: github.event_name == 'pull_request'
    
    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Install clang-format
        run: |
          sudo apt-get update
          
          # Try to install clang-format from default repos first
          if sudo apt-get install -y clang-format; then
            echo "✅ Installed clang-format from default repositories"
          else
            echo "📦 Installing clang-format from LLVM repository..."
            # Add LLVM repository for latest clang-format
            wget -qO- https://apt.llvm.org/llvm-snapshot.gpg.key | sudo tee /etc/apt/trusted.gpg.d/apt.llvm.org.asc
            echo "deb http://apt.llvm.org/noble/ llvm-toolchain-noble main" | sudo tee /etc/apt/sources.list.d/llvm.list
            sudo apt-get update
            sudo apt-get install -y clang-format
          fi
          
          # Verify installation
          clang-format --version

      - name: Check code formatting
        run: |
          echo "Checking code formatting..."
          
          # Find all C/C++ source files (excluding external dependencies)
          find . -name "*.cpp" -o -name "*.hpp" -o -name "*.c" -o -name "*.h" -o -name "*.cc" -o -name "*.cxx" \
            | grep -v -E '^\./(external|build|_deps|experimental)/' \
            > source_files.txt
          
          TOTAL_FILES=$(wc -l < source_files.txt)
          echo "Found $TOTAL_FILES C/C++ source files to check"
          
          if [ "$TOTAL_FILES" -eq 0 ]; then
            echo "✅ No source files found to check"
            exit 0
          fi
          
          echo "Sample files being checked:"
          head -5 source_files.txt
          
          # Check formatting more efficiently using git diff
          echo "Applying clang-format to check for differences..."
          TEMP_DIR=$(mktemp -d)
          
          # Copy .clang-format to temp directory
          cp .clang-format "$TEMP_DIR/"
          
          # Format files and check for differences
          MISFORMATTED_FILES=""
          while IFS= read -r file; do
            # Format to temp file and compare
            clang-format "$file" > "$TEMP_DIR/$(basename "$file")"
            if ! cmp -s "$file" "$TEMP_DIR/$(basename "$file")"; then
              MISFORMATTED_FILES="$MISFORMATTED_FILES$file\n"
            fi
          done < source_files.txt
          
          # Cleanup
          rm -rf "$TEMP_DIR"
          
          if [ -n "$MISFORMATTED_FILES" ]; then
            echo "❌ The following files are not properly formatted:"
            echo -e "$MISFORMATTED_FILES"
            echo ""
            echo "To fix formatting issues, run:"
            echo "  clang-format -i <file>"
            echo "Or to format changed files:"
            echo "  git diff --name-only HEAD~1 | grep -E '\\.(cpp|hpp|c|h)$' | xargs clang-format -i"
            exit 1
          else
            echo "✅ All source files are properly formatted"
          fi

  auto-format:
    name: Auto-Format Code
    runs-on: ubuntu-latest
    timeout-minutes: 15
    # Run when CI completes successfully on develop OR manual workflow dispatch
    if: |
      (github.event_name == 'workflow_run' && 
       github.event.workflow_run.conclusion == 'success' && 
       github.event.workflow_run.head_branch == 'develop') ||
      github.event_name == 'workflow_dispatch'
    
    steps:
      - name: Checkout source
        uses: actions/checkout@v4
        with:
          token: ${{ github.token }}
          fetch-depth: 0

      - name: Display trigger information
        run: |
          echo "## 🎨 Code Formatting Trigger Information"
          echo "- Event: ${{ github.event_name }}"
          echo "- Branch: ${{ github.ref }}"
          if [ "${{ github.event_name }}" = "workflow_run" ]; then
            echo "- Triggered by: ${{ github.event.workflow_run.name }}"
            echo "- Previous workflow status: ${{ github.event.workflow_run.conclusion }}"
            echo "- Source branch: ${{ github.event.workflow_run.head_branch }}"
          else
            echo "- Manual formatting trigger"
          fi

      - name: Install clang-format
        run: |
          sudo apt-get update
          
          # Try to install clang-format from default repos first
          if sudo apt-get install -y clang-format; then
            echo "✅ Installed clang-format from default repositories"
          else
            echo "📦 Installing clang-format from LLVM repository..."
            # Add LLVM repository for latest clang-format
            wget -qO- https://apt.llvm.org/llvm-snapshot.gpg.key | sudo tee /etc/apt/trusted.gpg.d/apt.llvm.org.asc
            echo "deb http://apt.llvm.org/noble/ llvm-toolchain-noble main" | sudo tee /etc/apt/sources.list.d/llvm.list
            sudo apt-get update
            sudo apt-get install -y clang-format
          fi
          
          # Verify installation
          clang-format --version

      - name: Determine files to format
        id: determine-files
        run: |
          echo "Determining which changed files to format..."
          
          # Format only changed files in this push/PR
          if ! git diff --name-only HEAD~1 HEAD \
            | grep -E '\.(cpp|hpp|c|h|cc|cxx)$' \
            | grep -v -E '^(external|build|_deps|experimental)/' \
            > files_to_format.txt; then
            touch files_to_format.txt  # Create empty file if no matches
          fi
          
          TOTAL_FILES=$(wc -l < files_to_format.txt)
          echo "Found $TOTAL_FILES changed C/C++ source files to format"
          echo "file_count=$TOTAL_FILES" >> $GITHUB_OUTPUT
          
          if [ "$TOTAL_FILES" -gt 0 ]; then
            echo "Changed files to format:"
            cat files_to_format.txt
          else
            echo "No relevant C/C++ files were changed"
          fi

      - name: Format source files
        id: format-files
        if: steps.determine-files.outputs.file_count != '0'
        run: |
          echo "Applying clang-format to selected files..."
          
          # Apply clang-format to selected files
          if ! xargs -r clang-format -i < files_to_format.txt; then
            echo "ERROR: clang-format failed"
            exit 1
          fi
          
          # Check if formatting made any changes
          if git diff --quiet; then
            echo "✅ Files were already properly formatted"
            echo "has_changes=false" >> $GITHUB_OUTPUT
          else
            echo "✨ Formatting changes applied"
            echo "has_changes=true" >> $GITHUB_OUTPUT
            
            echo "Files that were reformatted:"
            git diff --name-only
            
            echo "Summary of formatting changes:"
            git diff --stat
          fi

      - name: Commit and push formatting changes
        if: steps.format-files.outputs.has_changes == 'true'
        run: |
          echo "Committing formatting changes..."
          
          # Configure git
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action - Code Formatter"
          
          # Stage and commit changes
          git add -A
          git commit -m "🎨 Auto-format changed C/C++ source files with clang-format
          
          - Applied clang-format to changed C/C++ source files
          - Triggered after successful CI completion
          - Configuration: .clang-format"
          
          # Push changes
          if ! git push; then
            echo "ERROR: Failed to push formatting changes"
            exit 1
          fi
          
          echo "✅ Formatting changes committed and pushed"

      - name: Summary
        if: always()
        run: |
          echo "## 🎨 Code Formatting Summary"
          echo "- Event: ${{ github.event_name }}"
          echo "- Branch: ${{ github.ref }}"
          echo "- Files processed: ${{ steps.determine-files.outputs.file_count || '0' }}"
          echo "- Has changes: ${{ steps.format-files.outputs.has_changes || 'not checked' }}"
          
          if [ "${{ steps.format-files.outputs.has_changes }}" = "true" ]; then
            echo "- ✅ Changed files were automatically formatted and committed"
          elif [ "${{ steps.determine-files.outputs.file_count }}" = "0" ]; then
            echo "- ℹ️  No relevant C/C++ files were changed"
          else
            echo "- ✅ Changed files were already properly formatted"
          fi
          
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "- 🔧 Manually triggered formatting workflow"
          fi
